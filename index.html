<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no">
        <title>Pengumuman Kelulusan</title>
        <link rel="stylesheet" href="/css/style.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    </head>
    <body>

        <div class="container">
            <div class="header">
                <h2>Cek Kelulusan</h2>
                <p class="subtitle">Masukkan NISN atau Nomor Peserta untuk melihat hasil</p>
            </div>

            <div class="input-group">
                <input type="text" id="inputId" placeholder="532423020" autocomplete="off" inputmode="numeric">
                <button id="btnCek" type="button">Cek Hasil</button>
            </div>

            <div id="loadingArea" class="hidden loading-area" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                <p>Sabar ya...</p>
            </div>

            <div id="hasilArea" class="hidden">
                <h3 id="namaSiswa"></h3>
                <div id="statusKelulusan" class="status-box" role="status" aria-live="polite"></div>
                <p id="pesanSiswa" class="pesan"></p>
            </div>

            <div id="errorArea" class="hidden error-text" role="alert">
                <p id="errorText">Data tidak ditemukan. Pastikan nomor yang dimasukkan benar.</p>
            </div>
        </div>

        <script src="/js/script.js"></script>
    </body>
</html>
